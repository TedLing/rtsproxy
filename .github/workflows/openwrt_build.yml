name: Build ImmortalWrt MT7981 Package

on:
  release:
    types:
      - published
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ImmortalWrt MT7981
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ImmortalWrt for MT798x (MediaTek Filogic 830)
          - arch: mt7981
            sdk_url: https://github.com/Yuzhii0718/immortalwrt-mt798x-6.6-padavanonly.git
            is_git: true
            git_branch: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip qemu-utils zstd python3-pyelftools

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-immortalwrt-mt7981-${{ hashFiles('**/Makefile') }}

      - name: Download and setup SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          # Clone ImmortalWrt MT798x repository
          git clone --depth 1 --branch ${{ matrix.git_branch }} ${{ matrix.sdk_url }} sdk
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build Packages
        run: |
          cd sdk
          # Remove any existing rtsproxy package from feeds to avoid version conflict
          rm -rf package/feeds/*/rtsproxy
          rm -rf package/rtsproxy package/luci-app-rtsproxy
          
          # 准备本体
          mkdir -p package/rtsproxy
          cp $GITHUB_WORKSPACE/openwrt/rtsproxy/Makefile package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/openwrt/rtsproxy/files package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/src package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/include package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/webui package/rtsproxy/
          cp $GITHUB_WORKSPACE/meson.build package/rtsproxy/
          cp $GITHUB_WORKSPACE/meson_options.txt package/rtsproxy/
          
          # 准备 LuCI
          mkdir -p package/luci-app-rtsproxy
          cp $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/Makefile package/luci-app-rtsproxy/
          cp -r $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/root package/luci-app-rtsproxy/
          cp -r $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/htdocs package/luci-app-rtsproxy/ 2>/dev/null || true

          # 修复换行符
          find package/rtsproxy package/luci-app-rtsproxy -type f -exec sed -i 's/\r$//' {} +

          # 同步版本号和修订号
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          VERSION_FULL="${TAG_NAME#v}"

          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION_FULL/" package/rtsproxy/Makefile
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION_FULL/" package/luci-app-rtsproxy/Makefile

          # Ensure meson and ninja are available for ImmortalWrt
          ./scripts/feeds install meson ninja 2>/dev/null || true

          # 配置并编译
          echo "CONFIG_PACKAGE_rtsproxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-rtsproxy=y" >> .config
          make defconfig

          make package/rtsproxy/compile V=s
          make package/luci-app-rtsproxy/compile V=s

      - name: Collect artifacts
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          VERSION_FULL="${TAG_NAME#v}"
          mkdir -p output
          
          # Platform name for artifact naming
          PLATFORM_NAME="immortalwrt-mt7981"
          
          # 收集本体 (排除调试包)
          for file in $(find sdk/bin/packages/ -name "rtsproxy*.ipk" ! -name "luci-app-rtsproxy*" ! -name "*-dbgsym*"); do
            cp "$file" "output/rtsproxy_${VERSION_FULL}_${PLATFORM_NAME}.ipk"
          done
          # 收集 LuCI (排除调试包)
          for file in $(find sdk/bin/packages/ -name "luci-app-rtsproxy*.ipk" ! -name "*-dbgsym*"); do
            cp "$file" "output/luci-app-rtsproxy_${VERSION_FULL}_all.ipk"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtsproxy-ipk-mt7981
          path: output/*.ipk

  release:
    name: Release IPKs
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_ipk
          pattern: "rtsproxy-ipk-*"
          merge-multiple: true
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          # 直接上传到当前 Tag 的 Release
          gh release upload "$TAG_NAME" release_ipk/*.ipk --clobber
